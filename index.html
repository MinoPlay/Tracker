<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumption Tracker</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Tracker">
    <link rel="apple-touch-icon" href="icon-192.svg">

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1 onclick="toggleConfig()" style="cursor: pointer;">📊 Consumption Tracker</h1>
            <div class="quick-track">
                <button onclick="addEntry('beer')" class="track-btn beer" title="Add Beer">🍺</button>
                <button onclick="addEntry('wine')" class="track-btn wine" title="Add Wine">🍷</button>
                <button onclick="addEntry('liquor')" class="track-btn liquor" title="Add Liquor">🥃</button>
                <button onclick="addEntry('smoking')" class="track-btn smoking" title="Add Hookah">💨</button>
            </div>
        </header>

        <!-- GitHub Configuration -->
        <div class="config-section" id="config-section">
            <div class="mode-toggle">
                <button onclick="setMode('local')" class="mode-btn" id="mode-local">🏠 Local Mode</button>
                <button onclick="setMode('github')" class="mode-btn" id="mode-github">🐙 GitHub Mode</button>
            </div>
            <div class="config-form" id="github-config">
                <input type="password" id="github-token" placeholder="GitHub Personal Access Token" autocomplete="off">
                <input type="text" id="repo-owner" placeholder="GitHub Username" autocomplete="off">
                <input type="text" id="repo-name" placeholder="Repository Name" autocomplete="off">
                <button onclick="saveConfig()" class="btn-save">Save Configuration</button>
            </div>
            <div class="local-controls" id="local-controls" style="display: none;">
                <button onclick="generateDummyData()" class="btn-generate">🎲 Generate Sample Data</button>
                <button onclick="clearLocalData()" class="btn-clear">🗑️ Clear All Data</button>
            </div>
            <p class="config-help" id="github-help">
                Create a token with 'repo' scope at
                <a href="https://github.com/settings/tokens/new" target="_blank">GitHub Settings</a>
            </p>
            <p class="config-help" id="local-help" style="display: none;">
                Local mode stores data in your browser's localStorage. Data persists between sessions.
            </p>
        </div>


        <!-- Status Messages -->
        <div id="status" class="status hidden"></div>


        <!-- Statistics Section with Tabs -->
        <section class="chart-section" id="chart-section">
            <div class="chart-header">
                <h2 onclick="toggleChart()" style="cursor: pointer;">Statistics</h2>
                <div class="chart-controls">
                    <select id="chart-type" onchange="updateChartType()">
                        <option value="line">📈 Line Chart</option>
                        <option value="bar" selected>📊 Bar Chart</option>
                    </select>
                    <select id="time-period" onchange="updateTimePeriod()">
                        <option value="7">Last 7 Days</option>
                        <option value="30" selected>Last 30 Days</option>
                        <option value="90">Last 90 Days</option>
                        <option value="365">Last 365 Days</option>
                    </select>
                </div>
            </div>

            <!-- Tab Navigation -->
            <div class="tab-navigation">
                <button class="tab-btn active" onclick="switchTab('chart')">📊 Chart</button>
                <button class="tab-btn" onclick="switchTab('overview')">📈 Overview</button>
            </div>

            <!-- Tab Content: Chart View -->
            <div id="tab-chart" class="tab-content active">
                <div class="chart-container">
                    <canvas id="consumptionChart"></canvas>
                </div>
                <div class="summary-stats" id="summary-stats"></div>
            </div>



            <!-- Tab Content: Overview -->
            <div id="tab-overview" class="tab-content">
                <div class="overview-grid" id="overview-grid">
                </div>
            </div>
        </section>

        <!-- Entry History -->
        <section class="history-section">
            <h2>Recent Entries</h2>
            <div id="entries-list" class="entries-list">
                <p class="empty-message">No entries yet. Click a category button to start tracking!</p>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>

</html>
